version: '3'
services: 
  xrayr: 
    image: monlor/xrayr:main
    container_name: xrayr
    environment:
      - API_HOST=
      - API_KEY=
      - NODE_ID=1
      - LOG_LEVEL=warning
      #  V2ray, Shadowsocks, Trojan
      - NODE_TYPE=Trojan
      # for cert
      - DOMAIN=hk01.example.com
      - EMAIL=admin@example.com
      # default http
      # file: /etc/XrayR/cert/node.crt /etc/XrayR/cert/node.key
      - CERT_MODE=http
      # CERT_MODE=dns required
      - CLOUDFLARE_API_KEY=xxx
      - ENABLE_FALLBACK=true
      - ENABLE_DNS=true
      # VLess + Reality 模式（私钥/域名/ShortId 由面板 Xboard 下发，CERT_MODE 自动设为 none）
      # - NODE_TYPE=V2ray
      # - ENABLE_VLESS=true
      # - ENABLE_REALITY=true
      # 流媒体解锁dns
      - MEDIA_DNS_SERVER=1.2.3.4
      # device limit
      # - DEVICE_LIMIT=true
      # - REDIS_ADDR=127.0.0.1:6379
      # - REDIS_PASSWORD=123456
      # chatgpt outbound, ChatGPT(default) Warp IPv4_out IPv6_out
      # - CHATGPT_OUT=Warp
    volumes:
      - certs:/etc/XrayR/cert
    restart: unless-stopped
    network_mode: host

volumes:
  certs:
